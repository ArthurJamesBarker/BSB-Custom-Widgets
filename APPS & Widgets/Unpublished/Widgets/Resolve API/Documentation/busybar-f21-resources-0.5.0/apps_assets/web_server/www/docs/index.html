<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BSB Firmware API Documentation</title>
    <link rel="stylesheet" type="text/css" href="swagger-ui.css">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            margin: 0;
            background: #fafafa;
        }

        .swagger-ui .topbar {
            background-color: #2c3e50;
        }

        .swagger-ui .topbar .link {
            color: #ffffff;
        }

        .swagger-ui .info hgroup.main .title {
            color: #2c3e50;
        }

        .swagger-ui .scheme-container {
            background: #ffffff;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,.15);
            border-radius: 4px;
            margin: 20px 0;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div id="swagger-ui"></div>

    <script src="swagger-ui-bundle.js"></script>
    <script src="swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Determine the base URL dynamically
            const baseUrl = window.location.protocol + '//' + window.location.host;
            
            // Build the API spec URL
            const apiSpecUrl = baseUrl + '/openapi.yaml';
            
            // Initialize Swagger UI
            const ui = SwaggerUIBundle({
                url: apiSpecUrl,
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                defaultModelsExpandDepth: 2,
                defaultModelExpandDepth: 2,
                docExpansion: "list",
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                onComplete: function() {
                    console.log('Swagger UI initialized successfully');
                },
                onFailure: function(error) {
                    console.error('Failed to load API spec:', error);
                    document.getElementById('swagger-ui').innerHTML = 
                        '<div style="padding: 20px; color: red; text-align: center;">' +
                        '<h2>Failed to load API specification</h2>' +
                        '<p>Error: ' + error.message + '</p>' +
                        '<p>Make sure the API server is running and accessible.</p>' +
                        '</div>';
                }
            });
            
            window.ui = ui;
        };
    </script>
</body>
</html>
