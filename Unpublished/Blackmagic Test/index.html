<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackmagic Camera Control</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Blackmagic Camera Control</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText">Not Connected</span>
            </div>
        </header>

        <main>
            <div class="control-panel">
                <!-- Bluetooth Connection -->
                <div class="connection-section" id="bluetoothSection">
                    <h2>Bluetooth Connection</h2>
                    <div class="bluetooth-controls">
                        <button id="scanBluetoothBtn" class="btn btn-scan">Scan for Cameras</button>
                        <div class="device-list" id="deviceList">
                            <p class="no-devices">No devices found. Click "Scan for Cameras" to search.</p>
                        </div>
                        <button id="disconnectBluetoothBtn" class="btn btn-disconnect" style="display: none;">Disconnect</button>
                    </div>
                </div>

                <!-- Busy Bar Status -->
                <div class="connection-section" id="busyBarSection">
                    <h2>Busy Bar Status</h2>
                    <div class="busybar-controls">
                        <div class="busybar-connection-selector">
                            <label for="busyBarConnectionType">Connection Type:</label>
                            <select id="busyBarConnectionType">
                                <option value="usb">USB-C (10.0.4.20)</option>
                                <option value="wifi">WiFi (10.46.30.146)</option>
                            </select>
                            <button id="busyBarConnectBtn" class="btn btn-connect">Connect</button>
                        </div>
                        <div class="busybar-status" id="busyBarStatus">
                            <span class="status-label">Status:</span>
                            <span class="status-value" id="busyBarStatusValue">Not Initialized</span>
                        </div>
                        <button id="uploadImagesBtn" class="btn btn-upload" style="display: none;">Upload Images to Busy Bar</button>
                    </div>
                </div>

                <div class="recording-section">
                    <div class="recording-status" id="recordingStatus">
                        <div class="status-display">
                            <span class="status-label">Status:</span>
                            <span class="status-value" id="statusValue">Unknown</span>
                        </div>
                        <div class="recording-indicator" id="recordingIndicator"></div>
                    </div>

                    <div class="timecode-display" id="timecodeDisplay">
                        <span class="timecode-label">Timecode:</span>
                        <span class="timecode-value" id="timecodeValue">--:--:--:--</span>
                    </div>

                    <div class="button-group">
                        <button id="startRecordBtn" class="btn btn-record">
                            <span class="btn-icon">●</span>
                            Start Recording
                        </button>
                        <button id="stopRecordBtn" class="btn btn-stop" disabled>
                            <span class="btn-icon">■</span>
                            Stop Recording
                        </button>
                    </div>
                </div>

                <div class="camera-info" id="cameraInfo">
                    <h2>Camera Information</h2>
                    <div class="info-item">
                        <span class="info-label">Device:</span>
                        <span class="info-value" id="deviceName">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Product:</span>
                        <span class="info-value" id="productName">--</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Software Version:</span>
                        <span class="info-value" id="softwareVersion">--</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="error-message" id="errorMessage"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/sdi-protocol.js"></script>
    <script src="js/bluetooth-client.js"></script>
    <script src="js/busybar-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
