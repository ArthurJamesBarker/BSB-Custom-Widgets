<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premiere Pro Timeline Timecode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 300;
        }
        
        .sequence-name {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 400;
        }
        
        .timecode-display {
            font-family: 'Courier New', monospace;
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            letter-spacing: 4px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .timecode-display.connecting {
            color: #999;
            font-size: 24px;
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
        
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button.connect {
            background: #667eea;
            color: white;
        }
        
        button.connect:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button.disconnect {
            background: #dc3545;
            color: white;
        }
        
        button.disconnect:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: #666;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
        }
        
        .stat-label {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .stat-value {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premiere Pro Timeline</h1>
        <div class="sequence-name" id="sequenceName">No sequence active</div>
        
        <div class="timecode-display connecting" id="timecodeDisplay">
            Connecting...
        </div>
        
        <div class="status disconnected" id="status">
            Disconnected
        </div>
        
        <div class="controls">
            <button class="connect" id="connectBtn" onclick="connect()">Connect</button>
            <button class="disconnect" id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Frame Rate</div>
                <div class="stat-value" id="frameRate">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Seconds</div>
                <div class="stat-value" id="seconds">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Updates</div>
                <div class="stat-value" id="updateCount">0</div>
            </div>
        </div>
        
        <div class="info">
            Make sure the CEP panel is running in Premiere Pro and the server is started.
            <br>Default connection: ws://localhost:8080
        </div>
    </div>
    
    <script src="client.js"></script>
</body>
</html>
