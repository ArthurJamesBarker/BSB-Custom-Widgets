openapi: 3.1.0
info:
  title: BUSY Bar HTTP API
  description: HTTP API for BUSY Bar web server
  version: 6.3.0
  contact:
    name: tbd

security:
  - ApiKeyAuth: []

paths:
  /api/version:
    get:
      tags:
        - System
      summary: Get API version information
      description: Retrieves API version
      operationId: getVersion
      responses:
        "200":
          description: Version information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/access:
    get:
      tags:
        - Settings
      summary: Get HTTP API access over Wi-Fi configuration
      description: Get HTTP API access over Wi-Fi configuration
      operationId: getHttpAccess
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpAccessInfo"
    post:
      tags:
        - Settings
      summary: Set HTTP API access over Wi-Fi configuration
      description: Set HTTP API access over Wi-Fi configuration
      operationId: setHttpAccess
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: ["disabled", "enabled", "key"]
          description: Access mode
          example: "key"
        - name: key
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]+$"
          description: Access key (4-10 digits length)
          example: "12345678"
      responses:
        "200":
          description: Set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/name:
    get:
      tags:
        - Settings
      summary: Get current device name
      description: Get current device name
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameInfo"

    post:
      tags:
        - Settings
      summary: Set new device name
      description: Set new device name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameInfo"
      responses:
        "200":
          description: New name successfully set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid name parameter, or failed to store new name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/update:
    post:
      tags:
        - Updater
      summary: Update firmware
      description: Uploads a firmware update package (TAR file) and initiates the update process.
      operationId: updateFirmware
      parameters: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Firmware update TAR file.
      responses:
        "200":
          description: Update initiated successfully. The device will reboot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid parameters, invalid TAR file, or update preparation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Update package too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error during update process.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/update/check:
    post:
      tags:
        - Updater
      summary: Start firmware update check
      description: Initiates an asynchronous check for available firmware updates.
      operationId: checkFirmwareUpdate
      responses:
        "200":
          description: Update check started successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: Update check already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to start update check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/update/status:
    get:
      tags:
        - Updater
      summary: Get firmware update status
      description: Returns current update and check status including progress information.
      operationId: getFirmwareUpdateStatus
      responses:
        "200":
          description: Status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStatus"

  /api/update/changelog:
    get:
      tags:
        - Updater
      summary: Get update changelog
      description: Returns the changelog for a specific firmware version.
      operationId: getUpdateChangelog
      parameters:
        - name: version
          in: query
          required: true
          schema:
            type: string
          description: Firmware version to get changelog for
          example: "1.2.3"
      responses:
        "200":
          description: Changelog retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  changelog:
                    type: string
                    description: Changelog text
        "400":
          description: Version parameter missing, update not available, or version mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/update/install:
    post:
      tags:
        - Updater
      summary: Install firmware update
      description: |
        Starts asynchronous firmware installation from a remote URL.
        The update process (download, SHA verification, unpack, prepare, reboot) runs in the background.
        Use /api/update/status to monitor progress.
      operationId: installFirmwareUpdate
      parameters:
        - name: version
          in: query
          required: true
          schema:
            type: string
          description: Firmware version to install
          example: "1.2.3"
      responses:
        "200":
          description: Update installation started successfully in background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Version parameter missing, update not available, or version mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Update already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to start background installation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Battery too low for update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/update/abort_download:
    post:
      tags:
        - Updater
      summary: Abort ongoing firmware download
      description: Signals the updater to abort an ongoing download operation.
      operationId: abortFirmwareDownload
      responses:
        "200":
          description: Abort signal sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/update/autoupdate:
    get:
      tags:
        - Updater
      summary: Get autoupdate settings
      description: Returns current autoupdate configuration
      operationId: getAutoupdateSettings
      responses:
        "200":
          description: Settings retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoupdateSettings"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Updater
      summary: Set autoupdate settings
      description: Updates autoupdate configuration. All fields are optional - only provided fields are updated.
      operationId: setAutoupdateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoupdateSettings"
      responses:
        "200":
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid time format (expected HH:MM)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to apply settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/assets/upload:
    post:
      tags:
        - Assets
      summary: Upload asset file with app ID
      description: Uploads a file to a specific app's assets directory
      operationId: uploadAssetWithAppId
      parameters:
        - name: app_id
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._-]+$"
          description: Application ID for organizing assets
          example: "my_app"
        - name: file
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._-]+$"
          description: Filename for the uploaded asset
          example: "data.png"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File data to upload as raw binary content
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid parameters or upload failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Assets
      summary: Delete app assets
      description: Deletes all assets for a specific app ID
      operationId: deleteAppAssets
      parameters:
        - name: app_id
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._-]+$"
          description: Application ID whose assets should be deleted
          example: "my_app"
      responses:
        "200":
          description: Assets deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/write:
    post:
      tags:
        - Storage
      summary: Upload file to internal storage
      description: Uploads a file to a specified path
      operationId: writeStorageFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Path for the uploaded file
          example: "/ext/test.png"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File data to upload as raw binary content
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid parameters or upload failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/read:
    get:
      tags:
        - Storage
      summary: Download file from internal storage
      description: Downloads a file from a specified path
      operationId: readStorageFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Path to the file
          example: "/ext/test.png"
      responses:
        "200":
          description: File downloaded successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                description: File data as raw binary content
        "400":
          description: Invalid parameters or file not exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/list:
    get:
      tags:
        - Storage
      summary: List files on internal storage
      operationId: listStorageFiles
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Path to the file
          example: "/ext"
      responses:
        "200":
          description: Directory contents read successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageList"
        "400":
          description: Invalid parameters or directory does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/remove:
    delete:
      tags:
        - Storage
      summary: Remove a file on internal storage
      description: Removes a file with a specified path
      operationId: removeStorageFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Path of a file to remove
          example: "/ext/test.png"
      responses:
        "200":
          description: File deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid path or deletion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/mkdir:
    post:
      tags:
        - Storage
      summary: Create a directory on internal storage
      description: Creates a new directory with a specified path
      operationId: createStorageDir
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Path to a new directory
          example: "/ext/newdir"
      responses:
        "200":
          description: Directory created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid path or creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/rename:
    post:
      tags:
        - Storage
      summary: Rename/move a file
      description: Moves a file to a new location
      operationId: RenameStorageFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: Old location path
          example: "/ext/old_name.txt"
        - name: new_path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._\\-/]+$"
          description: New location path
          example: "/ext/new_name.txt"
      responses:
        "200":
          description: Renamed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid path or operation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/storage/status:
    get:
      tags:
        - Storage
      summary: Show storage usage
      operationId: getStorageStatus
      responses:
        "200":
          description: Storage status queried successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageStatus"
        "400":
          description: Invalid parameters or storage doesn't exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/display/draw:
    post:
      tags:
        - Assets
      summary: Draw on display
      description: |
        Sends drawing data to the display.
        Supports JSON-defined display elements.
      operationId: drawOnDisplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisplayElements"
      responses:
        "200":
          description: Drawing command executed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid drawing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Requested priority level is below that of currently active app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Display error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Assets
      summary: Clear display
      description: Clears the display and stops the Canvas application if running
      operationId: clearDisplay
      parameters:
        - name: app_id
          in: query
          required: false
          schema:
            type: string
          description: Application identifier
          example: "my_app"
      responses:
        "200":
          description: Display cleared successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          description: Display error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/display/brightness:
    get:
      tags:
        - Settings
      summary: Get display brightness
      description: Get brightness value for displays
      operationId: getDisplayBrightness
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisplayBrightnessInfo"
    post:
      tags:
        - Settings
      summary: Set display brightness
      description: |
        Set brightness for one or both displays
      operationId: setDisplayBrightness
      parameters:
        - name: value
          in: query
          required: false
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._-]+$"
          description: Displays brightness (0-100/auto)
          example: "50"
      responses:
        "200":
          description: Brightness set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/audio/play:
    post:
      tags:
        - Assets
      summary: Play audio file
      description: |
        Plays an audio file from the assets directory.
        Supported formats include .snd files.
      operationId: playAudio
      parameters:
        - name: app_id
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._-]+$"
          description: Application ID for organizing assets
          example: "my_app"
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9._/-]+$"
          description: Path to audio file within app's assets directory
          example: "data.snd"
      responses:
        "200":
          description: Audio playback started successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid file path or file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Audio system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - Assets
      summary: Stop audio playback
      description: Stops any currently playing audio
      operationId: stopAudio
      responses:
        "200":
          description: Audio playback stopped successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          description: Audio system error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/audio/volume:
    get:
      tags:
        - Settings
      summary: Get audio volume
      description: Get audio volume value
      operationId: getAudioVolume
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioVolumeInfo"
    post:
      tags:
        - Settings
      summary: Set audio volume
      description: Set audio volume value
      operationId: setAudioVolume
      parameters:
        - name: volume
          in: query
          required: true
          schema:
            type: number
          description: Audio volume (0-100)
          example: "50"
      responses:
        "200":
          description: Volume set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/input:
    get:
      tags:
        - Input

      summary: Input events streaming
      description: Start WebSocket session for input events streaming
      operationId: connectInputWebSocket
      responses:
        "101":
          description: WebSocket connection established
        "400":
          description: WebSocket upgrade failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "426":
          description: Upgrade required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Input
      summary: Send input event
      description: Send single key press event
      operationId: setInputKey
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
            enum:
              [
                "up",
                "down",
                "ok",
                "back",
                "start",
                "busy",
                "custom",
                "off",
                "apps",
                "settings",
              ]
          description: Key name
          example: "ok"
      responses:
        "200":
          description: Input event sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/status:
    get:
      tags:
        - System
      summary: Get device status
      description: Get device status
      operationId: getStatus
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/status/system:
    get:
      tags:
        - System
      summary: Get system status
      description: Get system status
      operationId: getStatusSystem
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusSystem"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/status/power:
    get:
      tags:
        - System
      summary: Get power status
      description: Get power status
      operationId: getStatusPower
      responses:
        "200":
          description: Information retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusPower"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/wifi/status:
    get:
      tags:
        - Wi-Fi
      description: Returns current Wi-Fi status
      parameters: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/wifi/connect:
    post:
      tags:
        - Wi-Fi
      description: Attempts to connect to Wi-Fi using config
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectRequestConfig"
      responses:
        "200":
          description: Network connection established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/wifi/disconnect:
    post:
      tags:
        - Wi-Fi
      description: Disconnects from Wi-Fi
      parameters: []
      responses:
        "200":
          description: Network connection terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/wifi/networks:
    get:
      tags:
        - Wi-Fi
      description: Scans environment for available Wi-Fi networks
      parameters: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkResponse"
        "400":
          description: Scan not possible when connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/screen:
    get:
      tags:
        - Streaming
      summary: Get single frame for requested screen
      parameters:
        - name: display
          in: query
          required: true
          schema:
            type: number
            pattern: "^[0-1]{1,1}$"
          description: Type of the display Front = 0, Back = 1
          example: 0
      responses:
        "200":
          description: OK
          content:
            image/bmp:
              schema:
                $ref: "#/components/schemas/ScreenResponse"
        "400":
          description: Wrong display
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/screen/ws:
    get:
      tags:
        - Streaming
      summary: Screen streaming WebSocket endpoint
      description: |
        WebSocket connection for real-time screen streaming.
        Upgrade from HTTP to WebSocket protocol is required.
        After connection, client must send desired display ID
        as JSON {"display": 0}
      operationId: connectWebSocket
      responses:
        "101":
          description: WebSocket connection established
        "400":
          description: Exceed max clients count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/enable:
    post:
      tags:
        - BLE
      summary: Enable BLE
      description: Enables BLE module and starts advertising
      parameters: []
      responses:
        "200":
          description: BLE enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/ble/disable:
    post:
      tags:
        - BLE
      summary: Disable BLE
      description: Stops advertising
      parameters: []
      responses:
        "200":
          description: BLE disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/ble/pairing:
    delete:
      tags:
        - BLE
      summary: Remove pairing
      description: Remove pairing with previous device
      parameters: []
      responses:
        "200":
          description: Pairing removed, now device is discoverable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Failed to remove because BLE is not initialized or pairing was already removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ble/status:
    get:
      tags:
        - BLE
      description: Returns current BLE status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BleStatusResponse"

  /api/time:
    get:
      tags:
        - Time
      summary: Get current timestamp with timezone
      description: Retrieves the current timestamp from RTC with timezone in ISO 8601 format
      operationId: getTime
      responses:
        "200":
          description: Timestamp retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimestampInfo"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/account:
    delete:
      tags:
        - Account
      summary: Unlink device from account
      description: Removes account linking data
      operationId: unlinkAccount
      responses:
        "200":
          description: Done successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/account/link:
    post:
      tags:
        - Account
      summary: Link device to account
      description: Requests account link PIN. Works only if device is connected to MQTT and is not linked to account
      operationId: linkAccount
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountLink"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/account/info:
    get:
      tags:
        - Account
      summary: Get linked account info
      description: Retrieves linked account data
      operationId: getAccountInfo
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"

  /api/account/status:
    get:
      tags:
        - Account
      summary: Get MQTT status info
      description: Retrieves MQTT status
      operationId: getAccountState
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountState"

  /api/account/profile:
    get:
      tags:
        - Account
      summary: Get MQTT profile
      description: Retrieves MQTT backend type (dev/prod/local)
      operationId: getAccountProfile
      responses:
        "200":
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfile"
    post:
      tags:
        - Account
      summary: Set MQTT profile
      description: Sets MQTT backend type (dev/prod/local)
      operationId: setAccountProfile
      parameters:
        - name: profile
          in: query
          required: true
          schema:
            type: string
            enum: ["dev", "prod", "local", "custom"]
          example: "dev"
        - name: custom_url
          in: query
          schema:
            type: string
            example: "mqtts://mqtt.example.com:8883"
      responses:
        "200":
          description: Set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/timestamp:
    post:
      tags:
        - Time
      summary: Set current timestamp
      description: |
        Sets the RTC timestamp in ISO 8601 format. Time zone qualifier (e.g. Z of UTC or +hh:mm for local time) is required.
      operationId: setTimeTimestamp
      parameters:
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}(-?)[0-9]{2}\\1[0-9]{2}T[0-9]{2}(:?)[0-9]{2}\\2[0-9]{2}(Z|([+-][0-9]{2}(:?[0-9]{2})?))$"
          description: ISO 8601 timestamp (e.g., 2025-10-02T14:30:45+02:00 for local time or 2025-10-02T14:30:45Z for UTC)
          example: "2025-10-02T14:30:45+0100"
      responses:
        "200":
          description: Timestamp set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid timestamp format or value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/timezone:
    get:
      tags:
        - Time
      summary: Get timezone
      description: Get current timezone name
      operationId: getTimeTimezone
      responses:
        "200":
          description: Timezone got successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimezoneInfo"
        "400":
          description: Invalid timezone offset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Time
      summary: Set timezone
      description: Sets the timezone name. Use /api/time/tzlist to get available names list.
      operationId: setTimeTimezone
      parameters:
        - name: timezone
          in: query
          required: true
          schema:
            type: string
            pattern: "^.+$"
          description: Timezone name
          example: "Stuttgart"
      responses:
        "200":
          description: Timezone set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid timezone offset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/time/tzlist:
    get:
      tags:
        - Time
      summary: Get list of supported time zones
      description: Retrieves the list of time zones accepted by /api/time/timezone
      operationId: getTimeTzlist
      responses:
        "200":
          description: Got the list successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimezoneListResponse"
        "400":
          description: Error getting time zone list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/busy/snapshot:
    get:
      tags:
        - Busy
      summary: Get BUSY timer snapshot
      description: Gets the current state of the BUSY timer in snapshot form
      operationId: getBusySnapshot
      responses:
        "200":
          description: Got snapshot successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusySnapshot"
        "400":
          description: Error getting snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Busy
      summary: Set BUSY time snapshot
      description: Run the timer starting from the given snapshot
      operationId: setBusySnapshot
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusySnapshot"
      responses:
        "200":
          description: Snapshot successfully set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error setting snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/matter/commissioning:
    get:
      tags:
        - Matter
      summary: Smart home commissioning status
      operationId: getMatterCommissioningStatus
      parameters: []
      responses:
        "200":
          description: Successfully got Matter commissioning status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatterCommissionedFabrics"
    post:
      tags:
        - Matter
      summary: Link device to a smart home
      operationId: startMatterCommissioning
      parameters: []
      responses:
        "200":
          description: Successfully started Matter commissioning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatterCommissioningPayload"
        "503":
          description: Internal Matter service is broken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Matter
      summary: Erase all smart home links
      parameters: []
      responses:
        "200":
          description: Successfully erased all Matter commissioning info, device restart is needed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Internal Matter service is broken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/matter/endpoint/1:
    get:
      tags:
        - Matter
      summary: Get Matter endpoint 1 state
      parameters: []
      responses:
        "200":
          description: Successfully got Matter endpoint 1 state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatterEndpointState"
        "503":
          description: Internal Matter service is broken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - Matter
      summary: Set Matter endpoint 1 state
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatterEndpointState"
      responses:
        "200":
          description: Successfully set Matter endpoint 1 state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "503":
          description: Internal Matter service is broken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Token

  schemas:
    SuccessResponse:
      type: object
      properties:
        result:
          type: string
          example: "OK"
          description: Success status message
      required:
        - result

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code
      required:
        - error
      example:
        error: "Invalid parameter"
        code: 400

    VersionInfo:
      type: object
      properties:
        api_semver:
          type: string
          description: API SemVer
          example: "0.0.0"
      required:
        - api_semver
      example:
        api_semver: "0.0.0"

    UpdateStatus:
      type: object
      properties:
        install:
          type: object
          properties:
            is_allowed:
              type: boolean
              description: Whether update installation is allowed (battery check)
            event:
              type: string
              enum:
                [
                  "session_start",
                  "session_stop",
                  "action_begin",
                  "action_done",
                  "detail_change",
                  "action_progress",
                  "none",
                ]
              description: Current update event
            action:
              type: string
              enum:
                [
                  "download",
                  "sha_verification",
                  "unpack",
                  "prepare",
                  "apply",
                  "none",
                ]
              description: Current update action
            status:
              type: string
              enum:
                [
                  "ok",
                  "battery_low",
                  "busy",
                  "download_failure",
                  "download_abort",
                  "sha_mismatch",
                  "unpack_staging_dir_failure",
                  "unpack_archive_open_failure",
                  "unpack_archive_unpack_failure",
                  "install_manifest_not_found",
                  "install_manifest_invalid",
                  "install_session_config_failure",
                  "install_pointer_setup_failure",
                  "unknown_failure",
                ]
              description: Current or last operation status
            detail:
              type: string
              description: Optional status detail string
            download:
              type: object
              properties:
                speed_bytes_per_sec:
                  type: integer
                  description: Current download speed in bytes per second
                received_bytes:
                  type: integer
                  description: Bytes received so far
                total_bytes:
                  type: integer
                  description: Total download size in bytes
        check:
          type: object
          properties:
            available_version:
              type: string
              description: Version of available update (empty if none)
            event:
              type: string
              enum: ["start", "stop", "none"]
              description: Current check event
            status:
              type: string
              enum: ["available", "not_available", "failure", "none"]
              description: Check result status
      example:
        install:
          is_allowed: true
          event: "none"
          action: "none"
          status: "ok"
          detail: ""
          download:
            speed_bytes_per_sec: 0
            received_bytes: 0
            total_bytes: 0
        check:
          available_version: "1.2.3"
          event: "stop"
          status: "available"

    AutoupdateSettings:
      type: object
      description: Autoupdate configuration settings. All fields are optional for POST requests.
      properties:
        is_enabled:
          type: boolean
          description: Whether automatic updates are enabled
          example: true
        interval_start:
          type: string
          description: Start of autoupdate window in HH:MM format (e.g., "08:00")
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "00:00"
        interval_end:
          type: string
          description: End of autoupdate window in HH:MM format (e.g., "23:59")
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "08:00"

    NameInfo:
      type: object
      properties:
        name:
          type: string
          description: Device name
          example: "BUSY bar"
      required:
        - name
      example:
        name: "BUSY bar"

    HttpAccessInfo:
      type: object
      properties:
        mode:
          type: string
          enum: ["disabled", "enabled", "key"]
          description: Access mode
          example: "key"
        key_valid:
          type: boolean
          description: Access key was set and is valid
          example: true

    StorageList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/StorageListElement"
          description: Array of elements to display
      required:
        - list
      example:
        list:
          - type: "file"
            name: "test.png"
            size: 65535
          - type: "dir"
            name: "assets"

    StorageStatus:
      type: object
      properties:
        used_bytes:
          type: integer
          example: 123456
        free_bytes:
          type: integer
          example: 654321
        total_bytes:
          type: integer
          description: "Total size of the partition"
          example: 777777

    StorageListElement:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum: [file, dir]
          description: Element type
        name:
          type: string
          pattern: "^[a-zA-Z0-9._/-]+$"
          description: File or directory name
      discriminator:
        propertyName: type
        mapping:
          file: "#/components/schemas/StorageFileElement"
          dir: "#/components/schemas/StorageDirElement"

    StorageFileElement:
      allOf:
        - $ref: "#/components/schemas/StorageListElement"
        - type: object
          required:
            - size
          properties:
            size:
              type: integer
              description: File size in bytes

    StorageDirElement:
      allOf:
        - $ref: "#/components/schemas/StorageListElement"
        - type: object

    BinaryUpload:
      type: string
      format: binary
      description: Binary data upload

    FileUpload:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: File to upload
      required:
        - file

    DisplayElements:
      type: object
      properties:
        app_id:
          type: string
          pattern: "^[a-zA-Z0-9._-]+$"
          description: Application ID for organizing assets
          example: "my_app"
        priority:
          type: integer
          description: Draw requests with a lower priority than the currently active draw request will be ignored. Value is 1 through 10, inclusive, higher number means higher priority. Any built-in app is treated as priority level 5.
          default: 6
        elements:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/TextElement"
              - $ref: "#/components/schemas/ImageElement"
              - $ref: "#/components/schemas/AnimElement"
              - $ref: "#/components/schemas/CountdownElement"
          description: Array of elements to display
      required:
        - app_id
        - elements
      example:
        app_id: "my_app"
        elements:
          - id: "0"
            timeout: 10
            align: center
            x: 36
            y: 10
            type: text
            text: "Hello, World! Long text"
            font: medium
            color: "#FFFFFFFF"
            width: 72
            scroll_rate: 1000
            display: front
          - id: "1"
            timeout: 6
            align: top_mid
            x: 36
            y: 0
            type: text
            text: "top_mid"
            font: small
            color: "#AAFF00FF"
            display: "front"
          - id: "2"
            timeout: 6
            type: "image"
            path: "data.png"
            x: 0
            y: 0
            display: "back"

    DisplayElement:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          description: Unique identifier for the element
        timeout:
          type: integer
          minimum: 0
          description: Time in seconds the element should be displayed (0 for no timeout). Mutually exclusive with display_until.
        display_until:
          type: string
          description: The element will be hidden when system time reaches the specified Unix timestamp (in seconds). Mutually exclusive with timeout.
        type:
          type: string
          enum: [text, image, anim, countdown]
          description: Type of display element
        x:
          type: integer
          description: X coordinate of selected anchor point relative to top-left of display
        y:
          type: integer
          description: Y coordinate of selected anchor point relative to top-left of display
        display:
          type: string
          enum: [front, back]
          description: Which display to show the element on (for dual-display devices)
          default: front
        align:
          type: string
          description: Anchor point of element. Also use `x` and `y` to position element.
          enum:
            - top_left
            - top_mid
            - top_right
            - mid_left
            - center
            - mid_right
            - bottom_left
            - bottom_mid
            - bottom_right
      discriminator:
        propertyName: type
        mapping:
          text: "#/components/schemas/TextElement"
          image: "#/components/schemas/ImageElement"
          anim: "#/components/schemas/AnimElement"
          countdown: "#/components/schemas/CountdownElement"

    TextElement:
      allOf:
        - $ref: "#/components/schemas/DisplayElement"
        - type: object
          required:
            - text
          properties:
            text:
              type: string
              description: Text content to display
            font:
              type: string
              description: One of the available fonts to display the text in
              enum:
                - small
                - medium
                - medium_condensed
                - big
              default: tiny5_8
            color:
              type: string
              description: "Color to display the text in, in #RRGGBBAA format"
              pattern: "^#[a-fA-F0-9]{8}$"
              default: "#FFFFFFFF"
            width:
              type: integer
              description: Width of the label
            scroll_rate:
              type: integer
              description: Scroll rate in pixels per minute

    ImageElement:
      allOf:
        - $ref: "#/components/schemas/DisplayElement"
        - type: object
          required:
            - path
          oneOf:
            - properties:
                path:
                  type: string
                  pattern: "^[a-zA-Z0-9._/-]+$"
                  description: Path to the image file in the app's assets
            - properties:
                builtin_image:
                  type: string
                  pattern: "^[a-z_]+/[a-z0-9_]+$"
                  description: Identifier of builtin image

    AnimElement:
      allOf:
        - $ref: "#/components/schemas/DisplayElement"
        - type: object
          allOf:
            - oneOf:
                - properties:
                    path:
                      type: string
                      pattern: "^[a-zA-Z0-9._/-]+$"
                      description: Path to the animation file in the app's assets
                - properties:
                    builtin_anim:
                      type: string
                      pattern: "^[a-z_]+/[a-z0-9_]+$"
                      description: Identifier of builtin animation
            - properties:
                loop:
                  type: boolean
                  description: Whether to loop the requested part of the animation
                  default: false
                await_previous_end:
                  type: boolean
                  description: If the element has been created before and this flag is true, the previous range will finish before the requested one starts.
                  default: false
                section_name:
                  type: string
                  description: Name of the section to play back. Specifying \"default\" selects the entire animation.

    CountdownElement:
      allOf:
        - $ref: "#/components/schemas/DisplayElement"
        - type: object
          required:
            - timestamp
            - direction
            - show_hours
          properties:
            timestamp:
              type: string
              description: "Seconds-based Unix UTC timestamp to count down or up to. Note: it's a number in a string."
            color:
              type: string
              description: "Color to display the text in, in #RRGGBBAA format"
              pattern: "^#[a-fA-F0-9]{8}$"
              default: "#FFFFFFFF"
            direction:
              type: string
              enum: [time_left, time_since]
              description: Whether to count up or down
            show_hours:
              type: string
              enum: [when_non_zero, always]
              description: When to show the hours position

    DisplayBrightnessInfo:
      type: object
      properties:
        value:
          type: string
          description: Displays brightness (0-100/auto)
          example: "auto"

    AudioVolumeInfo:
      type: object
      properties:
        volume:
          type: number
          description: Audio volume value (0-100)
          example: "50"

    TimestampInfo:
      type: object
      properties:
        timestamp:
          type: string
          description: ISO 8601 formatted timestamp with timezone
          example: "2025-10-02T14:30:45+04:00"
      required:
        - timestamp

    TimezoneInfo:
      type: object
      properties:
        timezone:
          type: string
          description: Timezone name
          example: "Berlin"
      required:
        - timezone

    Status:
      type: object
      properties:
        system:
          $ref: "#/components/schemas/StatusSystem"
        power:
          $ref: "#/components/schemas/StatusPower"

    StatusSystem:
      type: object
      properties:
        serial_number:
          type: string
          description: Device serial number
          example: "203638485431500400123456"
        api_semver:
          type: string
          description: API SemVer
          example: "0.0.0"
        version:
          type: string
          description: Firmware version
          example: "1.0.0"
        branch:
          type: string
          description: Git branch name
          example: "main"
        build_date:
          type: string
          description: Build date
          example: "2024-01-01"
        commit_hash:
          type: string
          description: Git commit hash (may include -dirty suffix)
          example: "abc123def456-dirty"
        uptime:
          type: string
          description: System uptime
          example: "00d 00h 04m 13s"
        boot_time:
          type: integer
          description: System boot timestamp
          example: 1767225600

    StatusPower:
      type: object
      properties:
        state:
          type: string
          enum: [discharging, charging, charged]
          description: Power state
          example: "discharging"
        battery_charge:
          type: integer
          description: Battery charge percent
          example: 99
        battery_voltage:
          type: integer
          description: Battery voltage in mV
          example: 4183
        battery_current:
          type: integer
          description: Battery current in mA
          example: -180
        usb_voltage:
          type: integer
          description: USB voltage in mV
          example: 4843

    WifiSecurityMethod:
      type: string
      example: "WPA3"
      enum: [Open, WPA, WPA2, WEP, WPA/WPA2, WPA3, WPA2/WPA3]

    WifiIpMethod:
      type: string
      example: "dhcp"
      enum: ["dhcp", "static"]

    WifiIpType:
      type: string
      example: "ipv4"
      enum: ["ipv4", "ipv6"]

    Network:
      type: object
      properties:
        ssid:
          type: string
          example: "42"
        security:
          $ref: "#/components/schemas/WifiSecurityMethod"
        rssi:
          type: integer
          example: "58"

    StatusResponse:
      type: object
      properties:
        state:
          type: string
          example: disconnected
          enum:
            - unknown
            - disconnected
            - connected
            - connecting
            - disconnecting
            - reconnecting
        ssid:
          type: string
          example: Your_WIFI_SSID
        bssid:
          type: string
          pattern: "^([A-F0-9]:){5}[A-F0-9]$"
          example: "EC:5A:00:0B:55:1D"
        channel:
          type: integer
          example: "3"
        rssi:
          type: integer
          example: "-43"
        security:
          $ref: "#/components/schemas/WifiSecurityMethod"
        ip_config:
          type: object
          properties:
            ip_method:
              $ref: "#/components/schemas/WifiIpMethod"
            ip_type:
              $ref: "#/components/schemas/WifiIpType"
            address:
              type: string
              example: 192.168.50.5

    ConnectRequestConfig:
      type: object
      properties:
        ssid:
          type: string
          example: Your_WIFI_SSID
        password:
          type: string
          example: Your_WIFI_Pass
        security:
          $ref: "#/components/schemas/WifiSecurityMethod"
        ip_config:
          type: object
          properties:
            ip_method:
              $ref: "#/components/schemas/WifiIpMethod"
            ip_type:
              type: string
              example: ipv4
              enum:
                - ipv4
                - ipv6
            address:
              type: string
              example: 192.168.50.5
            mask:
              type: string
              example: 255.255.255.0
            gateway:
              type: string
              example: 192.168.50.1

    NetworkResponse:
      type: object
      properties:
        count:
          type: integer
          example: 1
        networks:
          type: array
          items:
            $ref: "#/components/schemas/Network"

    ScreenResponse:
      type: string
      description: Frame for requested display encoded in base64
      format: base64

    AccountInfo:
      type: object
      properties:
        linked:
          type: boolean
          example: true
        id:
          type: string
          example: "12345678-9abc-def0-1234-56789abcdef0"
        email:
          type: string
          example: "name@example.com"
        user_id:
          type: string
          example: "12345678-9abc-def0-1234-56789abcdef0"

    AccountState:
      type: object
      properties:
        state:
          type: string
          example: "connected"
          enum: ["error", "disconnected", "connected"]

    AccountProfile:
      type: object
      properties:
        state:
          type: string
          example: "dev"
          enum: ["dev", "prod", "local", "custom"]
        custom_url:
          type: string
          example: "mqtts://mqtt.example.com:8883"

    AccountLink:
      type: object
      properties:
        code:
          type: string
          example: "ABCD"
        expires_at:
          type: integer
          example: 1761060863

    BleStatusResponse:
      type: object
      properties:
        state:
          type: string
          enum:
            [
              "reset",
              "initialization",
              "disabled",
              "enabled",
              "connected",
              "internal error",
            ]
          example: connected
        address:
          type: string
          example: 50:DA:D6:FE:DD:A9
        pairing:
          type: string
          enum: ["unknown", "not paired", "paired"]
          example: paired

    BusySnapshot:
      type: object
      properties:
        snapshot:
          type: object
          oneOf:
            - $ref: "#/components/schemas/BusySnapshotNotStarted"
            - $ref: "#/components/schemas/BusySnapshotInfinite"
            - $ref: "#/components/schemas/BusySnapshotSimple"
            - $ref: "#/components/schemas/BusySnapshotInterval"
        snapshot_timestamp_ms:
          type: integer
          example: 1761582532251
      required:
        - snapshot
        - snapshot_timestamp_ms

    BusySnapshotNotStarted:
      type: object
      properties:
        type:
          type: string
          enum: ["NOT_STARTED"]
          example: "NOT_STARTED"
      required:
        - type

    BusySnapshotInfinite:
      type: object
      properties:
        type:
          type: string
          enum: ["INFINITE"]
          example: "INFINITE"
        card_id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        is_paused:
          type: boolean
          example: false
      required:
        - type
        - card_id
        - is_paused

    BusySnapshotSimple:
      type: object
      properties:
        type:
          type: string
          enum: ["SIMPLE"]
          example: "SIMPLE"
        card_id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        time_left_ms:
          type: integer
          example: 9000
        is_paused:
          type: boolean
          example: false
      required:
        - type
        - card_id
        - time_left_ms
        - is_paused

    BusySnapshotInterval:
      type: object
      properties:
        type:
          type: string
          enum: ["INTERVAL"]
          example: "INTERVAL"
        card_id:
          type: string
          example: "00000000-0000-0000-0000-000000000000"
        current_interval:
          type: integer
          example: 1
        current_interval_time_total_ms:
          type: integer
          example: 60000
        current_interval_time_left_ms:
          type: integer
          example: 42690
        is_paused:
          type: boolean
          example: false
        interval_settings:
          $ref: "#/components/schemas/BusySnapshotIntervalSettings"
      required:
        - type
        - card_id
        - current_interval
        - current_interval_time_total_ms
        - current_interval_time_left_ms
        - is_paused
        - interval_settings

    BusySnapshotIntervalSettings:
      type: object
      properties:
        type:
          type: string
          enum: ["INTERVAL"]
          example: "INTERVAL"
        interval_work_ms:
          type: integer
          example: 120000
        interval_rest_ms:
          type: integer
          example: 60000
        interval_work_cycles_count:
          type: integer
          example: 3
        is_autostart_enabled:
          type: boolean
          example: false

    TimezoneListResponse:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: "Time zone name"
            example: "Bangalore"
          offset:
            type: string
            description: "Time zone offset from UTC"
            example: "+05:30"
          abbr:
            type: string
            description: "Time zone abbreviation"
            example: "IST"

    MatterCommissionedFabrics:
      type: object
      properties:
        fabric_count:
          type: integer
          example: 1
          description: 'Number of Matter smart homes ("fabrics") that this device is linked with ("commissioned into")'
        latest_commissioning_status:
          type: object
          properties:
            value:
              type: string
              enum:
                - never_started
                - started
                - completed_successfully
                - failed
              description: 'Latest state of Matter smart home linking ("commissioning") process. Note: "never_started" only refers to the current power cycle of the device; this status is not recorded across reboots.'
              example: "completed_successfully"
            timestamp:
              type: string
              description: "UTC Unix millisecond timestamp of latest state update. Note: it's a number in a string."
              example: "1769436711000"
    MatterCommissioningPayload:
      type: object
      properties:
        available_until:
          type: string
          description: 'Linking with ("commissioning into") a Matter smart home using the provided payload is possible before this UTC Unix millisecond timestamp. Note: it''s a number in a string.'
          example: "1769437579000"
        qr_code:
          type: string
          description: 'Payload of the QR code for linking with ("commissioning into") a Matter smart home'
          example: "MT:YNDA0-O913..VV7I000"
        manual_code:
          type: string
          description: 'Manual code for linking with ("commissioning into") a Matter smart home'
          example: "1155-360-0377"
    MatterEndpointState:
      type: object
      properties:
        type:
          type: string
          enum:
            - switch
          description: 'Type of device emulated by a Matter endpoint. Currently only "switch" is implemented.'
          example: switch
        state:
          type: boolean
          description: 'State of device emulated by a Matter endpoint. Boolean for "switch" device type.'
          example: false
        startup:
          type: string
          enum:
            - "off"
            - "on"
            - toggle
            - last
          description: 'For the "switch" device type, specifies the value on startup. Never sent by the server, but can be specified by the client.'

tags:
  - name: System
    description: System information and control
  - name: Time
    description: Time-related methods
  - name: Updater
    description: Firmware update control
  - name: Wi-Fi
    description: Allows to operate with Wi-Fi
  - name: Assets
    description: Asset file management and display control
  - name: Streaming
    description: Screen streaming
  - name: Settings
    description: Device settings
  - name: Input
    description: Input events
  - name: BLE
    description: Allows to operate with BLE
  - name: Account
    description: Account linking and MQTT status
  - name: Busy
    description: BUSY timer control